<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Study Exam Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f7fb;
}

.hero{
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
padding:60px 20px;
text-align:center;
}

.hero h1{
font-size:38px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
opacity:0.9;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
margin-top:-40px;
}

.form-group{
margin-bottom:15px;
}

.form-group label{
display:block;
margin-bottom:5px;
font-weight:600;
}

.form-group input{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
font-size:15px;
}

.start-btn{
width:100%;
background:#1e3c72;
color:white;
border:none;
padding:15px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

.start-btn:hover{
background:#16315d;
}

.exam-section{
display:none;
}

.question-box{
background:white;
padding:20px;
margin-top:20px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.question-number{
font-size:18px;
font-weight:600;
margin-bottom:10px;
}

.question-text{
font-size:20px;
margin-bottom:20px;
}

.option{
display:block;
padding:12px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:8px;
cursor:pointer;
}

.option input{
margin-right:10px;
}

.timer{
background:#dc3545;
color:white;
padding:12px;
border-radius:10px;
font-size:20px;
font-weight:bold;
text-align:center;
margin-top:15px;
}

.submit-btn{
width:100%;
margin-top:20px;
background:#28a745;
color:white;
border:none;
padding:15px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

.result-box{
display:none;
background:white;
padding:30px;
margin-top:20px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.result-box h2{
margin-bottom:15px;
}

.score{
font-size:40px;
font-weight:bold;
color:#1e3c72;
}

</style>
</head>

<body>

<div class="hero">
<h1>Smart Study Youth Computer Education Centre</h1>
<p>Online Examination Portal</p>
</div>

<div class="container">

<div class="card" id="studentForm">

<h2 style="margin-bottom:20px;">Student Information</h2>

<div class="form-group">
<label>Student's Name</label>
<input type="text" id="name">
</div>

<div class="form-group">
<label>Roll Number</label>
<input type="text" id="roll">
</div>

<div class="form-group">
<label>Teacher's Name</label>
<input type="text" id="teacher">
</div>

<div class="form-group">
<label>Batch</label>
<input type="text" id="batch">
</div>

<div class="form-group">
<label>Access Code</label>
<input type="password" id="accessCode">
</div>

<button class="start-btn" onclick="startExam()">
Start Examination
</button>

</div>
  <div class="exam-section" id="examSection">

<div class="timer" id="timer">50:00</div>

<div class="question-box">

<div class="question-number" id="questionNumber">
Question 1 of 20
</div>

<div class="question-text" id="questionText">
Loading...
</div>

<div id="optionsArea"></div>

<button class="submit-btn" onclick="submitExam()">
Submit Exam
</button>

</div>

</div>

<div class="result-box" id="resultBox">

<h2>Exam Completed</h2>

<p>Your Score</p>

<div class="score" id="finalScore">
0 / 50
</div>

</div>
 <script>

const SHEET_API = "https://script.google.com/macros/s/AKfycbzR9DaZxMHdG7kOTqC0iAp7TzaulQ89HdTe9oh9Ju5cf3OMRE0e3C15G1_2c0NLS4BJTA/exec";

let questions = [];
let currentQuestion = 0;
let score = 0;

let timeLeft = 3000; // 50 minutes
let timer;
let startTime;

function startExam(){

let name = document.getElementById("name").value;
let roll = document.getElementById("roll").value;
let teacher = document.getElementById("teacher").value;
let batch = document.getElementById("batch").value;
let accessCode = document.getElementById("accessCode").value;

if(name=="" || roll=="" || teacher=="" || batch=="" || accessCode==""){
alert("সব তথ্য পূরণ করুন");
return;
}

if(accessCode !== "SMART2026"){
alert("ভুল Access Code");
return;
}

startTime = new Date();

startTimer();

fetch(SHEET_API)
.then(res => res.json())
.then(data=>{

questions = data;

document.getElementById("studentForm").style.display="none";
document.getElementById("examSection").style.display="block";

loadQuestion();

})
.catch(err=>{
alert("Question Loading Failed");
console.log(err);
});

}

function startTimer(){

timer = setInterval(()=>{

let minutes = Math.floor(timeLeft/60);
let seconds = timeLeft%60;

document.getElementById("timer").innerHTML =
String(minutes).padStart(2,'0') + ":" +
String(seconds).padStart(2,'0');

timeLeft--;

if(timeLeft < 0){

clearInterval(timer);

alert("সময় শেষ");

submitExam();

}

},1000);

}

function loadQuestion(){

if(currentQuestion >= questions.length){
submitExam();
return;
}

let q = questions[currentQuestion];

document.getElementById("questionNumber").innerHTML =
"Question " + (currentQuestion+1) +
" of " + questions.length;

document.getElementById("questionText").innerHTML =
q[0];

document.getElementById("optionsArea").innerHTML = `

<label class="option">
<input type="radio" name="answer" value="A">
${q[1]}
</label>

<label class="option">
<input type="radio" name="answer" value="B">
${q[2]}
</label>

<label class="option">
<input type="radio" name="answer" value="C">
${q[3]}
</label>

<label class="option">
<input type="radio" name="answer" value="D">
${q[4]}
</label>

<button class="submit-btn" onclick="nextQuestion()">
Next Question
</button>

`;

}

function nextQuestion(){

let selected =
document.querySelector('input[name="answer"]:checked');

if(!selected){
alert("একটি উত্তর নির্বাচন করুন");
return;
}

let correctAnswer =
questions[currentQuestion][5];

if(selected.value === correctAnswer){
score++;
}

currentQuestion++;

loadQuestion();

}

function submitExam(){

clearInterval(timer);

let endTime = new Date();

let usedMinutes =
Math.floor((endTime-startTime)/60000);

let finalMarks =
Math.round((score/questions.length)*50);

document.getElementById("examSection").style.display="none";

document.getElementById("resultBox").style.display="block";

document.getElementById("finalScore").innerHTML =
finalMarks + "/50<br><br>Time Used : " +
usedMinutes + " Minute";

let resultData = {

name:document.getElementById("name").value,
roll:document.getElementById("roll").value,
teacher:document.getElementById("teacher").value,
batch:document.getElementById("batch").value,
timeUsed:usedMinutes,
score:finalMarks,
accessCode:document.getElementById("accessCode").value,
examDate:new Date().toLocaleDateString()

};

fetch(SHEET_API,{
method:"POST",
body:JSON.stringify(resultData)
})
.then(res=>res.text())
.then(data=>console.log(data))
.catch(err=>console.log(err));

}

</script>
